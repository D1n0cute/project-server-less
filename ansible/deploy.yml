- name: Full Deploy to AKS
  hosts: local

  tasks:
    - name: Install ingress controller
      command: >
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml

    - name: Wait ingress ready
      command: kubectl wait --namespace ingress-nginx \
        --for=condition=ready pod \
        --selector=app.kubernetes.io/component=controller \
        --timeout=180s

    - name: Apply deployment
      command: kubectl apply -f {{ playbook_dir }}/../k8s/deployment.yaml

    - name: Apply service
      command: kubectl apply -f {{ playbook_dir }}/../k8s/service.yaml

    - name: Apply ingress
      command: kubectl apply -f {{ playbook_dir }}/ingress.yaml
